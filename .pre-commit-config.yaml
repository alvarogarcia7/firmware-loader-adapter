repos:
  - repo: local
    hooks:
      - id: fmt-check
        name: Format check
        entry: make fmt-check
        language: system
        pass_filenames: false
        stages: [commit]
      
      - id: clippy
        name: Clippy lints
        entry: make clippy
        language: system
        pass_filenames: false
        stages: [commit]
      
      - id: fmt-check-push
        name: Format check
        entry: make fmt-check
        language: system
        pass_filenames: false
        stages: [push]
      
      - id: lint
        name: Lint
        entry: make lint
        language: system
        pass_filenames: false
        stages: [push]
      
      - id: test
        name: Tests
        entry: make test
        language: system
        pass_filenames: false
        stages: [push]
